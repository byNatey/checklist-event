<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Checklist Event</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .accordion-header {
            cursor: pointer;
            padding: 10px;
            background: #222;
            border: 1px solid #333;
            margin-top: 5px;
        }
        .accordion-content {
            display: none;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #333;
        }
        .accordion-content.open {
            display: block;
        }
        .dark-mode-extra {
            background: #000;
            color: #fff;
        }
        .compact input[type=text] {
            height: 22px;
        }
        .addTaskBtn {
            margin-top: 8px;
            padding: 4px 8px;
            font-size: 0.9em;
        }
    </style>
</head>

<body>

    <h1>Checklist Event</h1>

    <!-- SECTION 1 -->
    <div class="accordion-header">Section 1</div>
    <div class="accordion-content">
        <div>
            <input type="checkbox" id="cb1">
            <label for="cb1">Tâche 1</label><br>
            <input type="text" id="txt1" placeholder="Note…"><br>
        </div>

        <button class="addTaskBtn">+ Ajouter une tâche</button>
    </div>

    <!-- SECTION 2 -->
    <div class="accordion-header">Section 2</div>
    <div class="accordion-content">
        <div>
            <input type="checkbox" id="cb2">
            <label for="cb2">Tâche 2</label><br>
            <input type="text" id="txt2" placeholder="Note…"><br>
        </div>

        <button class="addTaskBtn">+ Ajouter une tâche</button>
    </div>

    <!-- BLOC SYNCHRONISATION -->
    <div style="padding: 10px; border-top: 1px solid #444; margin-top: 20px;">
        <h3>Synchronisation</h3>

        <label for="githubToken">Token GitHub :</label>
        <input type="password" id="githubToken" placeholder="Collez votre token ici" style="width:100%; margin-bottom:10px;">

        <button id="saveTokenBtn">Enregistrer le token</button>
        <button id="syncNowBtn">Synchroniser maintenant</button>

        <p id="syncStatus" style="font-size: 0.9em; opacity: 0.7; margin-top: 10px;"></p>
    </div>

    <!-- SCRIPT GLOBAL -->
    <script>
    document.addEventListener("DOMContentLoaded", () => {

        /* ---------------------------------------------------
           SAUVEGARDE LOCALE
        --------------------------------------------------- */

        const STORAGE_CHECKBOX = "event_checklist_checkbox_state_v2";
        const STORAGE_TEXT = "event_checklist_text_state_v2";

        function saveCheckboxes() {
            const boxes = document.querySelectorAll("input[type='checkbox'][id]");
            const state = {};
            boxes.forEach(b => state[b.id] = b.checked);
            localStorage.setItem(STORAGE_CHECKBOX, JSON.stringify(state));
        }

        function loadCheckboxes() {
            const raw = localStorage.getItem(STORAGE_CHECKBOX);
            if (!raw) return;
            const state = JSON.parse(raw);
            Object.entries(state).forEach(([id, val]) => {
                const el = document.getElementById(id);
                if (el) el.checked = val;
            });
        }

        function saveTextFields() {
            const fields = document.querySelectorAll("input[type='text'][id]");
            const state = {};
            fields.forEach(f => state[f.id] = f.value);
            localStorage.setItem(STORAGE_TEXT, JSON.stringify(state));
        }

        function loadTextFields() {
            const raw = localStorage.getItem(STORAGE_TEXT);
            if (!raw) return;
            const state = JSON.parse(raw);
            Object.entries(state).forEach(([id, val]) => {
                const el = document.getElementById(id);
                if (el) el.value = val;
            });
        }

        document.body.addEventListener("change", e => {
            if (e.target.matches("input[type='checkbox']")) saveCheckboxes();
        });

        document.body.addEventListener("input", e => {
            if (e.target.matches("input[type='text']")) saveTextFields();
        });

        loadCheckboxes();
        loadTextFields();


        /* ---------------------------------------------------
           ACCORDÉONS
        --------------------------------------------------- */

        function toggleAccordion(header) {
            header.classList.toggle("open");
            const content = header.nextElementSibling;
            if (!content) return;
            content.classList.toggle("open");
        }

        document.querySelectorAll(".accordion-header").forEach((h, i) => {
            h.addEventListener("click", () => toggleAccordion(h));
            if (i < 2) toggleAccordion(h);
        });


        /* ---------------------------------------------------
           SYNCHRONISATION GITHUB
        --------------------------------------------------- */

        const repoOwner = "byNatey";
        const repoName = "checklist-event";
        const dataFilePath = "data.json";

        function getToken() {
            return localStorage.getItem("githubToken") || "";
        }

        document.getElementById("saveTokenBtn").onclick = () => {
            const token = document.getElementById("githubToken").value.trim();
            if (token.length < 10) {
                alert("Token invalide");
                return;
            }
            localStorage.setItem("githubToken", token);
            alert("Token enregistré localement !");
        };

        async function loadDataFromGitHub() {
            const token = getToken();
            if (!token) return;

            const url = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${dataFilePath}`;

            const response = await fetch(url, {
                headers: { Authorization: `Bearer ${token}` }
            });

            if (!response.ok) {
                console.error("Erreur lecture GitHub", await response.text());
                return;
            }

            const file = await response.json();
            const content = JSON.parse(atob(file.content));

            // Checkboxes
            if (content.checkboxes) {
                for (const id in content.checkboxes) {
                    const checkbox = document.getElementById(id);
                    if (checkbox) checkbox.checked = content.checkboxes[id];
                }
            }

            // Champs texte
            if (content.textfields) {
                for (const id in content.textfields) {
                    const field = document.getElementById(id);
                    if (field) field.value = content.textfields[id];
                }
            }

            document.getElementById("syncStatus").innerText = "Synchronisé depuis GitHub ✔";
        }

        async function saveDataToGitHub() {
            const token = getToken();
            if (!token) return;

            const url = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${dataFilePath}`;

            const getResp = await fetch(url, {
                headers: { Authorization: `Bearer ${token}` }
            });

            const file = await getResp.json();

            // Checkboxes
            const checkboxes = {};
            document.querySelectorAll("input[type=checkbox][id]").forEach(cb => {
                checkboxes[cb.id] = cb.checked;
            });

            // Champs texte
            const textfields = {};
            document.querySelectorAll("input[type=text][id]").forEach(tf => {
                textfields[tf.id] = tf.value;
            });

            const newContent = {
                checkboxes,
                textfields
            };

            const encoded = btoa(JSON.stringify(newContent, null, 2));

            await fetch(url, {
                method: "PUT",
                headers: {
                    Authorization: `Bearer ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Update checklist",
                    content: encoded,
                    sha: file.sha
                })
            });

            document.getElementById("syncStatus").innerText = "Synchronisé vers GitHub ✔";
        }

        document.getElementById("syncNowBtn").onclick = () => {
            loadDataFromGitHub();
        };

        setInterval(() => {
            loadDataFromGitHub();
        }, 15000);


        /* ---------------------------------------------------
           AJOUT DYNAMIQUE DE TÂCHES
        --------------------------------------------------- */

        function createUniqueId(prefix) {
            return prefix + "_" + Math.random().toString(36).substring(2, 10);
        }

        function addNewTask(container) {
            const idCheckbox = createUniqueId("cb");
            const idText = createUniqueId("txt");

            const wrapper = document.createElement("div");
            wrapper.innerHTML = `
                <input type="checkbox" id="${idCheckbox}">
                <label for="${idCheckbox}">Nouvelle tâche</label><br>
                <input type="text" id="${idText}" placeholder="Note…"><br>
            `;

            const btn = container.querySelector(".addTaskBtn");
            container.insertBefore(wrapper, btn);

            const cb = wrapper.querySelector(`#${idCheckbox}`);
            const tf = wrapper.querySelector(`#${idText}`);

            cb.addEventListener("change", () => {
                saveCheckboxes();
                saveDataToGitHub();
            });

            tf.addEventListener("input", () => {
                saveTextFields();
                saveDataToGitHub();
            });

            saveCheckboxes();
            saveTextFields();
            saveDataToGitHub();
        }

        document.querySelectorAll(".addTaskBtn").forEach(btn => {
            btn.addEventListener("click", () => {
                const container = btn.closest(".accordion-content");
                addNewTask(container);
            });
        });

        // Synchronisation initiale
        loadDataFromGitHub();

    });
    </script>

</body>
</html>
